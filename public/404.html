<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>bo-Paul Portfolio</title>
    <script>
      // GitHub Pages SPA 路由回退方案：
      // 访问任何不存在的路径（如 /project/xxx ）时，
      // Pages 会返回本 404.html。我们把原始路径保存到 sessionStorage，
      // 然后跳转回 index.html，App 启动后再把路径恢复到浏览器地址栏。
      (function () {
        var l = window.location;
        var path = l.pathname.replace(/\/+$/, '') || '/';
        var query = l.search;
        var hash = l.hash;
        try {
          sessionStorage.setItem(
            'spa-redirect',
            JSON.stringify({ path: path, query: query, hash: hash })
          );
        } catch (e) {}
        l.replace('./' + (hash || ''));
      })();
    </script>
  </head>
  <body></body>
</html>
